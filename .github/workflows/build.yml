name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        runtime: [win-x64, win-arm64]

    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true

      - name: Restore dependencies
        run: dotnet restore

      - name: Check formatting
        run: dotnet format --verify-no-changes --severity warn

      - name: Build (strict — warnings as errors)
        run: dotnet build -c Release --no-restore

      - name: Run tests
        run: dotnet test -c Release --no-build --verbosity normal --collect:"XPlat Code Coverage"

      - name: Publish
        run: >
          dotnet publish src/SCTools.App/SCTools.App.csproj
          -c Release -r ${{ matrix.runtime }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishReadyToRun=true
          -o publish/${{ matrix.runtime }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SCTools-${{ matrix.runtime }}
          path: publish/${{ matrix.runtime }}/
