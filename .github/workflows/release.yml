name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v2.0.0)'
        required: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  release:
    name: Release (${{ matrix.runtime }})
    runs-on: windows-latest

    strategy:
      matrix:
        runtime: [win-x64, win-arm64]

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: >
          dotnet build -c Release --no-restore
          -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Publish
        run: >
          dotnet publish src/SCTools.App/SCTools.App.csproj
          -c Release -r ${{ matrix.runtime }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishReadyToRun=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ steps.version.outputs.version }}
          -o publish/${{ matrix.runtime }}

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Download previous release (for delta)
        continue-on-error: true
        run: >
          vpk download github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.GITHUB_TOKEN }}
          --outputDir ./releases-prev
          --channel ${{ matrix.runtime }}

      - name: Pack with Velopack
        run: >
          vpk pack
          --packId SCTools
          --packVersion ${{ steps.version.outputs.version }}
          --packDir ./publish/${{ matrix.runtime }}
          --packTitle "SCTools — Star Citizen Companion"
          --packAuthors "SCTools Contributors"
          --mainExe SCTools.exe
          --channel ${{ matrix.runtime }}
          --runtime ${{ matrix.runtime }}
          --targetDir ./releases

      - name: Upload Velopack release to GitHub
        run: >
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --tag ${{ steps.version.outputs.tag }}
          --token ${{ secrets.GITHUB_TOKEN }}
          --releaseName "SCTools ${{ steps.version.outputs.version }}"
          --channel ${{ matrix.runtime }}
          --merge

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SCTools-velopack-${{ matrix.runtime }}
          path: releases/
          retention-days: 90
